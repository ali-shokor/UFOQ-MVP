<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="120 150 520 590"
  role="img"
  aria-labelledby="logo-title logo-description"
  preserveAspectRatio="xMidYMid meet"
>
  <title id="logo-title">IMKAN Academy logo</title>
  <desc id="logo-description">
    A stylized letter I and letter A joined by a rising turquoise arrow,
    with orange circular and triangular accents.
  </desc>

  <defs>
    <linearGradient id="navy-left" x1="346" y1="287" x2="230" y2="527" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07539A"/>
      <stop offset="0.52" stop-color="#043E79"/>
      <stop offset="1" stop-color="#022144"/>
    </linearGradient>

    <linearGradient id="navy-right" x1="446" y1="431" x2="569" y2="705" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#023E77"/>
      <stop offset="0.46" stop-color="#075EAE"/>
      <stop offset="1" stop-color="#032E5C"/>
    </linearGradient>

    <linearGradient id="teal-arrow" x1="180" y1="704" x2="526" y2="213" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#02A9B9"/>
      <stop offset="0.52" stop-color="#0CC1C9"/>
      <stop offset="1" stop-color="#04B5C1"/>
    </linearGradient>

    <linearGradient id="orange-accent" x1="266" y1="192" x2="462" y2="708" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF5711"/>
      <stop offset="0.58" stop-color="#FF6115"/>
      <stop offset="1" stop-color="#FF6A1E"/>
    </linearGradient>

  </defs>

  <g>
    <!-- Orange dot above the I -->
    <circle cx="294" cy="224" r="49" fill="url(#orange-accent)"/>

    <!-- Left navy pillar -->
    <path
      d="M236 291H356
         C334 304 323 325 323 349
         V455
         L236 536Z"
      fill="url(#navy-left)"
    />

    <!-- Navy right leg of the A -->
    <path
      d="M455 420
         L593 712
         H489
         L408 550
         C398 530 399 506 412 486Z"
      fill="url(#navy-right)"
    />

    <!-- Rising arrow forming the left leg and cross-motion of the A -->
    <path
      d="M146 712
         C158 649 188 604 236 551
         C281 501 326 456 374 403
         C422 350 463 297 499 267
         L451 261
         L549 204
         L544 320
         L516 274
         C481 345 429 422 373 489
         C321 551 286 606 281 712Z"
      fill="url(#teal-arrow)"
    />

    <!-- Orange counter/accent inside the A -->
    <path d="M432 632L469 712H394Z" fill="url(#orange-accent)"/>
  </g>
</svg>
